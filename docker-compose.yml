services:
  unilink-mongo:
    image: mongo:7
    container_name: unilink-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: unilink
    volumes:
      - unilink-mongo-data:/data/db
    networks:
      - unilink-network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  unilink-backend:
    build:
      context: ./backend
    container_name: unilink-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "5000:5000"
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      unilink-mongo:
        condition: service_healthy
    networks:
      - unilink-network

  unilink-mongo-express:
    image: mongo-express:1.0.2
    container_name: unilink-mongo-express
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: password
      ME_CONFIG_MONGODB_URL: mongodb://admin:password@unilink-mongo:27017/?authSource=admin
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      unilink-mongo:
        condition: service_healthy
    ports:
      - "8081:8081"
    networks:
      - unilink-network

volumes:
  unilink-mongo-data:

networks:
  unilink-network:
    driver: bridge
